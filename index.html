async function dbGet(key) {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/kv?key=eq.${key}&select=value`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
    });
    const rows = await r.json();
    if (rows && rows.length) return JSON.parse(rows[0].value);
  } catch(_) {}
  try { return JSON.parse(localStorage.getItem(key)); } catch(_) { return null; }
}

async function dbSet(key, val) {
  const body = JSON.stringify({ key, value: JSON.stringify(val) });
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/kv`, {
      method: 'POST',
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        Prefer: 'resolution=merge-duplicates'
      },
      body
    });
  } catch(_) {}
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(_) {}
}

function buildPalas(orders, stored) {
  const out = {};
  orders.filter(o => o.fulfillmentStatus !== 'FULFILLED').forEach(order => {
    let idx = 0;
    (order.lineItems||[]).forEach(item => {
      for (let i = 0; i < (item.quantity||1); i++) {
        idx++;
        const id = `${order.name}-P${idx}`;
        const base = {
          id, orderName:order.name, customer:order.customerName, product:item.title,
          orderCreatedAt:order.createdAt, pago:order.financialStatus, shopifyNote:order.note||null,
          lastModified: Date.now(),
          phases: FASES.map(f => ({ id:f.id, status:'pendiente', startedAt:null, finishedAt:null })),
          notes: [],
        };
        out[id] = stored[id]
          ? { ...base, phases:stored[id].phases, notes:stored[id].notes, lastModified:stored[id].lastModified||base.lastModified }
          : base;
      }
    });
  });
  return out;
}

function faseActualId(pala) {
  const ep = pala.phases.find(p => p.status === 'en_proceso');
  if (ep) return ep.id;
  const pend = pala.phases.find(p => p.status === 'pendiente');
  if (!pend) return null;
  if (pend.id === 1) return 1;
  const prev = pala.phases.find(p => p.id === pend.id - 1);
  return prev?.status === 'completada' ? pend.id : null;
}
// Pala completada = todas las fases completadas
function estaCompletada(p) { return p.phases.every(f => f.status === 'completada'); }

// Filtra palas que no deben mostrarse:
// - completadas hace más de 24h
// - en fase 10 completada (independientemente del tiempo)
function debeOcultarse(p) {
  if (!estaCompletada(p)) return false;
  const fase10 = p.phases.find(f => f.id === 10);
  if (!fase10?.finishedAt) return false;
  const completadaHace = Date.now() - new Date(fase10.finishedAt).getTime();
  return completadaHace > 24 * 60 * 60 * 1000;
}
function progreso(p)       { return Math.round(p.phases.filter(f => f.status === 'completada').length / FASES.length * 100); }
function tieneAnomalia(p)  { return p.notes.some(n => n.type === 'anomalia'); }
function tieneInfo(p)      { return p.notes.some(n => n.type === 'info'); }
function fmt(ts)    { if (!ts) return '—'; return new Date(ts).toLocaleString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
function fmtF(ts)   { return new Date(ts).toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function fmtH(ts)   { if (!ts) return '—'; return new Date(ts).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}); }

}

    {tieneAnomalia(pala) && <span title="Anomalía">⚠️</span>}
    {pala.shopifyNote    && <span title={pala.shopifyNote}>💬</span>}
    {tieneInfo(pala)     && <span title="Nota interna">📝</span>}
  </span>;
}

  const [refreshing, setRefreshing] = useState(false);
  const [refreshMsg, setRefreshMsg] = useState('');
  const justLoaded = useRef(true);

  useEffect(() => {
    setPalas(buildPalas(ORDERS, {}));
    justLoaded.current = true;
    (async () => {
      const st = await dbGet(KEY_STATE);
      justLoaded.current = true;
      setPalas(buildPalas(ORDERS, st?.palas || {}));
      justLoaded.current = true;
    })();
  }, []);

  useEffect(() => {
    if (!Object.keys(palas).length) return;
    if (justLoaded.current) { justLoaded.current = false; return; }
    setSave('saving');
    dbSet(KEY_STATE, { palas, modified: Date.now() }).then(() => {
      setSave('saved'); setSaveTime(Date.now());
    });
  }, [palas]);

  useEffect(() => {
    const iv = setInterval(async () => {
      try {
        const st = await dbGet(KEY_STATE);
        if (!st?.palas) return;
        setPalas(local => {
          let changed = false;
          const merged = { ...local };
          for (const [id, remote] of Object.entries(st.palas)) {
            if (!local[id] || (remote.lastModified||0) > (local[id]?.lastModified||0)) {
              merged[id] = remote; changed = true;
            }
          }
          return changed ? merged : local;
        });
      } catch(_) {}
    }, POLL_MS);
    return () => clearInterval(iv);
  }, []);

  async function refreshOrders() {
    setRefreshing(true);
    setRefreshMsg('');
    try {
      const res = await fetch('/api/refresh');
      const data = await res.json();
      if (data.ok) {
        setPalas(prev => buildPalas(data.orders, prev));
        setRefreshMsg(`✅ ${data.count} pedidos actualizados`);
      } else {
        setRefreshMsg(`❌ Error: ${data.error}`);
      }
    } catch(e) {
      setRefreshMsg(`❌ ${e.message}`);
    }
    setRefreshing(false);
    setTimeout(() => setRefreshMsg(''), 4000);
  }

  function retroceder(palaId, faseId) {
    // Resetea la fase indicada y la anterior a pendiente
    setPalas(p => {
      const x = p[palaId];
      return {...p, [palaId]: {...x, lastModified:Date.now(), phases: x.phases.map(f =>
        f.id === faseId ? {...f, status:'pendiente', startedAt:null, finishedAt:null} :
        f.id === faseId - 1 ? {...f, status:'pendiente', startedAt:null, finishedAt:null} : f
      )}};
    });
  }

  function iniciar(palaId, fId) {
    setPalas(p => { const x=p[palaId]; return {...p,[palaId]:{...x,lastModified:Date.now(),phases:x.phases.map(f=>f.id===fId?{...f,status:'en_proceso',startedAt:new Date().toISOString()}:f)}}; });
  }
  function completar(palaId, fId) {
    setPalas(p => { const x=p[palaId]; return {...p,[palaId]:{...x,lastModified:Date.now(),phases:x.phases.map(f=>f.id===fId?{...f,status:'completada',finishedAt:new Date().toISOString()}:f)}}; });
  }
  function addNota(palaId, {texto,tipo,autor}) {
    setPalas(p => {
      const x=p[palaId]; const fId=faseActualId(x); const fase=FASES.find(f=>f.id===fId);
      const nota={id:`${palaId}-${Date.now()}`,text:texto,type:tipo,author:autor,phaseId:fId,phaseName:fase?.nombre||'—',timestamp:new Date().toISOString()};
      return {...p,[palaId]:{...x,lastModified:Date.now(),notes:[...x.notes,nota]}};
    });
  }

  const lista = Object.values(palas).filter(p => !debeOcultarse(p));
  const [vistaSuper, setVistaSuper] = useState(false);
  const saveDot = saveStatus==='saved'?'#4ade80':saveStatus==='saving'?'#f5c518':'#555';
  const saveLbl = saveStatus==='saving'?'Guardando…':saveStatus==='saved'?`Guardado ${fmtH(saveTime)}`:'Sin cambios';

  return (
    <div style={{minHeight:'100vh',background:'#0a0a0a',color:'white'}}>
      <header style={{background:'#111',borderBottom:'1px solid #333',position:'sticky',top:0,zIndex:20}}>
        <div style={{maxWidth:900,margin:'0 auto',padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
          <div>
            <img src="https://spacepadel.es/wp-content/uploads/2024/03/SPACEPADEL_logotipo_blanco.png" alt="SPACEPADEL" style={{height:36,width:'auto'}} onError={e=>{e.target.style.display='none';e.target.nextSibling.style.display='block';}} />
            <span style={{display:'none',fontSize:22,fontWeight:900,letterSpacing:2}}>SPACEPADEL</span>
            <div style={{fontSize:12,color:'#888'}}>🛒 {ORDERS.length} pedidos · {lista.length} palas</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
            <div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'#888',background:'#1a1a1a',border:'1px solid #333',borderRadius:8,padding:'6px 10px'}}>
              <span style={{width:8,height:8,borderRadius:'50%',background:saveDot,display:'inline-block'}}/>
              {saveLbl}
            </div>
            <button onClick={refreshOrders} disabled={refreshing} style={{padding:'10px 18px',borderRadius:10,fontWeight:700,fontSize:15,border:'none',background:'#333',color:'#fff',opacity:refreshing?0.6:1,display:'flex',alignItems:'center',gap:8}}>
              {refreshing ? '⏳ Actualizando…' : '🔄 Actualizar pedidos'}
            </button>
            {refreshMsg && <span style={{fontSize:13,color:refreshMsg.startsWith('✅')?'#4ade80':'#f87171'}}>{refreshMsg}</span>}
            <button onClick={()=>{setVista('dashboard');setPalaSel(null);}} style={{padding:'10px 18px',borderRadius:10,fontWeight:700,fontSize:15,border:'none',background:vista==='dashboard'&&!vistaSuper?'#f5c518':'#222',color:vista==='dashboard'&&!vistaSuper?'#000':'#fff'}}>📋 Dashboard</button>
            <button onClick={()=>{setVista('trabajador');setPalaSel(null);setVistaSuper(false);}} style={{padding:'10px 18px',borderRadius:10,fontWeight:700,fontSize:15,border:'none',background:vista==='trabajador'&&!vistaSuper?'#f5c518':'#222',color:vista==='trabajador'&&!vistaSuper?'#000':'#fff'}}>👷 Por trabajador</button>
            <button onClick={()=>{setVistaSuper(v=>!v);setPalaSel(null);}} style={{padding:'10px 18px',borderRadius:10,fontWeight:700,fontSize:15,border:'none',background:vistaSuper?'#9333ea':'#222',color:'#fff'}}>🔧 Supervisor</button>
          </div>
        </div>
      </header>
      <main style={{maxWidth:900,margin:'0 auto',padding:16}}>
        {vistaSuper
          ? <Supervisor palas={lista} onSelect={setPalaSel} cambiarFase={(palaId, faseId) => {
              setPalas(p => {
                const x = p[palaId];
                return {...p, [palaId]: {...x, lastModified:Date.now(), phases: x.phases.map(f =>
                  f.id === faseId ? {...f, status:'en_proceso', startedAt:new Date().toISOString(), finishedAt:null} :
                  f.id < faseId ? {...f, status:'completada', finishedAt:f.finishedAt||new Date().toISOString()} :
                  {...f, status:'pendiente', startedAt:null, finishedAt:null}
                )}};
              });
            }}/>
          : vista==='dashboard'
            ? <Dashboard palas={lista} onSelect={setPalaSel}/>
            : <Trabajador palas={lista} trab={trab} setTrab={setTrab} onSelect={setPalaSel} iniciar={iniciar} completar={completar}/>
        }
      </main>
      {palaSel && palas[palaSel] && (
        <Detalle pala={palas[palaSel]} onClose={()=>setPalaSel(null)} iniciar={iniciar} completar={completar} addNota={addNota} retroceder={retroceder}/>
      )}
    </div>
  );
}

    .filter(p => !busqueda.trim() || p.id.toLowerCase().includes(busqueda.toLowerCase()) || p.product.toLowerCase().includes(busqueda.toLowerCase()))

  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <div style={{background:'#1e1030',border:'1px solid #9333ea',borderRadius:12,padding:12,fontSize:13,color:'#c084fc'}}>
        🔧 Modo supervisor — puedes mover cualquier pala a cualquier fase directamente.
      </div>
      <input value={busqueda} onChange={e=>setBusqueda(e.target.value)} placeholder="🔍 Buscar pala…" style={{width:'100%',background:'#111',border:'1px solid #444',borderRadius:12,padding:'12px 16px',color:'white',fontSize:15,boxSizing:'border-box'}}/>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {lista.map(pala => {
          const fId = faseActualId(pala) || (estaCompletada(pala) ? 10 : 1);
          const faseActual = FASES.find(f => f.id === fId);
          return (
            <div key={pala.id} style={{background:'#111',border:'1px solid #333',borderRadius:14,padding:14}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8,marginBottom:10}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontWeight:800,fontSize:16}}>{pala.id}</span>
                  <Iconos pala={pala}/>
                  <span style={{color:'#888',fontSize:13}}>{pala.product}</span>
                </div>
                <button onClick={()=>onSelect(pala.id)} style={{padding:'6px 12px',borderRadius:8,background:'#222',color:'#f5c518',border:'1px solid #f5c518',fontSize:13,fontWeight:600}}>Ver ficha</button>
              </div>
              <div style={{fontSize:13,color:'#888',marginBottom:8}}>
                Fase actual: <span style={{color:'#f5c518',fontWeight:700}}>{fId} — {faseActual?.nombre}</span> · {faseActual?.responsable}
              </div>
              <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                {FASES.map(f => {
                  const fase = pala.phases.find(p=>p.id===f.id);
                  const esActual = f.id === fId;
                  return (
                    <button key={f.id} onClick={()=>cambiarFase(pala.id, f.id)}
                      style={{padding:'6px 10px',borderRadius:8,fontSize:12,fontWeight:600,border:'none',cursor:'pointer',
                        background: esActual ? '#f5c518' : fase.status==='completada' ? '#0d2e0d' : '#222',
                        color: esActual ? '#000' : fase.status==='completada' ? '#4ade80' : '#888',
                        outline: esActual ? '2px solid #f5c518' : 'none'
                      }}
                      title={`Mover a fase ${f.id}: ${f.nombre}`}
                    >
                      {f.id}. {f.nombre.length > 10 ? f.nombre.slice(0,10)+'…' : f.nombre}
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Dashboard({palas, onSelect}) {
  const [busqueda, setBusqueda] = useState('');
  const pedidos = {};
  palas.forEach(p => {
    if (!pedidos[p.orderName]) pedidos[p.orderName]={name:p.orderName,customer:p.customer,createdAt:p.orderCreatedAt,pago:p.pago,shopifyNote:p.shopifyNote,palas:[]};
    pedidos[p.orderName].palas.push(p);
  });
  const todasListas = Object.values(pedidos).sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));
  const lista = busqueda.trim()
    ? todasListas.filter(p => p.name.toLowerCase().includes(busqueda.toLowerCase()) || p.customer?.toLowerCase().includes(busqueda.toLowerCase()))
    : todasListas;
  const anomalias = palas.filter(p=>tieneAnomalia(p)).length;
  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:12}}>
        {[['Palas totales',palas.length,'#fff'],['En curso',palas.filter(p=>!estaCompletada(p)).length,'#f5c518'],['Anomalías',anomalias,'#f87171']].map(([l,v,c])=>(
          <div key={l} style={{background:'#111',border:'1px solid #333',borderRadius:16,padding:16}}>
            <div style={{fontSize:32,fontWeight:900,color:c}}>{v}</div>
            <div style={{fontSize:13,color:'#888',marginTop:2}}>{l}</div>
          </div>
        ))}
      </div>
      <input value={busqueda} onChange={e=>setBusqueda(e.target.value)} placeholder="🔍 Buscar por número de pedido o cliente…" style={{width:'100%',background:'#111',border:'1px solid #444',borderRadius:12,padding:'12px 16px',color:'white',fontSize:15,boxSizing:'border-box'}} />
      {lista.map(ped => {
        const tot=ped.palas.length*FASES.length;
        const hec=ped.palas.reduce((a,p)=>a+p.phases.filter(f=>f.status==='completada').length,0);
        const pct=Math.round(hec/tot*100);
        return (
          <div key={ped.name} style={{background:'#111',border:ped.shopifyNote?'1px solid #9333ea':'1px solid #333',borderRadius:16,padding:20}}>
            <div style={{display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:8,marginBottom:12}}>
              <div>
                <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                  <span style={{fontSize:20,fontWeight:900}}>{ped.name}</span>
                  <span style={{color:'#888'}}>{ped.customer}</span>
                  <PagoBadge pago={ped.pago}/>
                </div>
                <div style={{fontSize:13,color:'#666',marginTop:2}}>Entrada: {fmtF(ped.createdAt)} · {ped.palas.length} pala{ped.palas.length>1?'s':''}</div>
                {ped.shopifyNote && <div style={{marginTop:8,background:'#1e1030',borderLeft:'4px solid #9333ea',padding:'8px 12px',borderRadius:'0 8px 8px 0',fontSize:13,color:'#c084fc'}}>💬 {ped.shopifyNote}</div>}
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:28,fontWeight:900,color:'#f5c518'}}>{pct}%</div>
                <div style={{fontSize:12,color:'#666'}}>avance</div>
              </div>
            </div>
            <Barra pct={pct}/>
            <div style={{marginTop:12,display:'flex',flexDirection:'column',gap:6}}>
              {ped.palas.map(pala => {
                const fId=faseActualId(pala); const fase=FASES.find(f=>f.id===fId); const comp=estaCompletada(pala);
                return (
                  <button key={pala.id} onClick={()=>onSelect(pala.id)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:'#1a1a1a',border:'1px solid #2a2a2a',borderRadius:10,padding:'10px 14px',color:'white',textAlign:'left',gap:8}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <span style={{fontWeight:700}}>{pala.id}</span>
                      <Iconos pala={pala}/>
                      <span style={{color:'#888',fontSize:13}}>{pala.product}</span>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:8,fontSize:13}}>
                      <span style={{color:'#aaa'}}>{comp?'✅ Enviado':`Fase ${fId}: ${fase?.nombre||'—'}`}</span>
                      <span style={{color:'#f5c518',fontWeight:600}}>Ver →</span>
                    </div>
                  </button>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Trabajador({palas, trab, setTrab, onSelect, iniciar, completar}) {
  function palasDe(n) {
    return palas.filter(p=>{ const fId=faseActualId(p); if(!fId) return false; return FASES.find(f=>f.id===fId)?.responsable===n; }).sort((a,b)=>new Date(a.orderCreatedAt)-new Date(b.orderCreatedAt));
  }
  const cola = palasDe(trab);
  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
        {TRABAJADORES.map(t => {
          const n=palasDe(t.nombre).length; const activo=t.nombre===trab;
          return (
            <button key={t.nombre} onClick={()=>setTrab(t.nombre)} style={{borderRadius:14,padding:'14px 10px',textAlign:'center',border:activo?'2px solid #f5c518':'2px solid #333',background:activo?'#3a2e00':'#111',color:activo?'#f5c518':'#fff'}}>
              <div style={{fontSize:17,fontWeight:700}}>{t.nombre}</div>
              <div style={{fontSize:13,marginTop:2,color:activo?'#f5c518aa':'#888'}}>{n} pala{n!==1?'s':''}</div>
            </button>
          );
        })}
      </div>
      {cola.length===0
        ? <div style={{background:'#111',border:'1px solid #333',borderRadius:16,padding:40,textAlign:'center',color:'#666',fontSize:17}}>No hay palas para {trab} ahora mismo ✅</div>
        : cola.map((pala,idx)=>{
          const fId=faseActualId(pala); const faseObj=pala.phases.find(p=>p.id===fId); const fase=FASES.find(f=>f.id===fId);
          return (
            <div key={pala.id} style={{background:'#111',border:pala.shopifyNote?'1px solid #9333ea':'1px solid #333',borderRadius:16,padding:16}}>
              <div style={{display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{background:'#f5c518',color:'#000',fontWeight:900,borderRadius:8,padding:'4px 10px',fontSize:14}}>#{idx+1}</span>
                  <div>
                    <div style={{display:'flex',alignItems:'center',gap:6}}><span style={{fontWeight:700,fontSize:17}}>{pala.id}</span><Iconos pala={pala}/></div>
                    <div style={{fontSize:13,color:'#888'}}>{pala.product}</div>
                    <div style={{fontSize:12,color:'#555'}}>entrada {fmtF(pala.orderCreatedAt)}</div>
                  </div>
                </div>
                <div style={{textAlign:'right'}}><div style={{fontSize:12,color:'#888'}}>Fase {fId}</div><div style={{fontWeight:600}}>{fase.nombre}</div></div>
              </div>
              {pala.shopifyNote && <div style={{marginTop:10,background:'#1e1030',borderLeft:'4px solid #9333ea',padding:'8px 12px',borderRadius:'0 8px 8px 0',fontSize:13,color:'#c084fc'}}>💬 {pala.shopifyNote}</div>}
              <div style={{marginTop:12,display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                <Badge status={faseObj.status}/>
                {faseObj.status!=='en_proceso'
                  ? <button onClick={()=>iniciar(pala.id,fId)} style={{padding:'10px 18px',borderRadius:10,background:'#f5c518',color:'#000',fontWeight:700,border:'none',fontSize:15}}>▶ Iniciar</button>
                  : <button onClick={()=>completar(pala.id,fId)} style={{padding:'10px 18px',borderRadius:10,background:'#4ade80',color:'#000',fontWeight:700,border:'none',fontSize:15}}>✓ Completar</button>
                }
                <button onClick={()=>onSelect(pala.id)} style={{padding:'10px 18px',borderRadius:10,background:'#222',color:'#fff',fontWeight:600,border:'1px solid #444',fontSize:15}}>Ver ficha</button>
              </div>
            </div>
          );
        })
      }
    </div>
  );
}

function Detalle({pala, onClose, iniciar, completar, addNota, retroceder}) {
  const [texto,setTexto]=useState('');
  const [tipo,setTipo]=useState('info');
  const [autor,setAutor]=useState(AUTORES[0]);
  const fId=faseActualId(pala); const comp=estaCompletada(pala);
  const notas=[...pala.notes].sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',zIndex:30,display:'flex',justifyContent:'flex-end'}}>
      <div style={{background:'#0f0f0f',width:'100%',maxWidth:600,height:'100%',overflowY:'auto',borderLeft:'1px solid #333'}}>
        <div style={{background:'#111',borderBottom:'1px solid #333',padding:'16px 20px',position:'sticky',top:0,zIndex:10,display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
              <span style={{fontSize:22,fontWeight:900}}>{pala.id}</span>
              <Iconos pala={pala}/>
              <PagoBadge pago={pala.pago}/>
            </div>
            <div style={{fontSize:13,color:'#888',marginTop:2}}>{pala.orderName} · {pala.customer}</div>
            <div style={{fontSize:13,color:'#666'}}>{pala.product} · {progreso(pala)}% completado</div>
          </div>
          <button onClick={onClose} style={{padding:'8px 14px',borderRadius:10,background:'#222',color:'#fff',border:'1px solid #444',fontWeight:700,fontSize:16}}>✕</button>
        </div>
        <div style={{padding:20,display:'flex',flexDirection:'column',gap:24}}>
          {pala.shopifyNote && (
            <div style={{background:'#1e1030',border:'2px solid #9333ea',borderRadius:16,padding:16}}>
              <div style={{fontWeight:700,color:'#c084fc',marginBottom:6}}>💬 Nota del cliente</div>
              <div style={{color:'#e9d5ff',whiteSpace:'pre-wrap'}}>{pala.shopifyNote}</div>
            </div>
          )}
          {notas.length > 0 && (
            <div>
              <div style={{fontWeight:700,fontSize:16,marginBottom:10}}>📋 Notas e incidencias</div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {notas.map(n=>(
                  <div key={n.id} style={{background:n.type==='anomalia'?'#2e0d0d':'#111',border:n.type==='anomalia'?'1px solid #f87171':'1px solid #333',borderRadius:12,padding:12}}>
                    <div style={{display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:4,marginBottom:4}}>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <span style={{fontWeight:700,fontSize:13}}>{n.author}</span>
                        <span style={{fontSize:12,padding:'2px 8px',borderRadius:999,background:n.type==='anomalia'?'#3d1515':'#1e1b4b',color:n.type==='anomalia'?'#f87171':'#818cf8'}}>{n.type==='anomalia'?'⚠️ Anomalía':'📝 Info'}</span>
                      </div>
                      <span style={{fontSize:12,color:'#666'}}>{fmt(n.timestamp)}</span>
                    </div>
                    <div style={{color:'#ddd',whiteSpace:'pre-wrap'}}>{n.text}</div>
                    <div style={{fontSize:12,color:'#555',marginTop:4}}>Fase: {n.phaseName}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
          <div>
            <div style={{fontWeight:700,fontSize:17,marginBottom:12}}>Pipeline de producción</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {FASES.map(fase => {
                const f=pala.phases.find(p=>p.id===fase.id); const esAct=fase.id===fId;
                const bg=f.status==='completada'?'#0d2e0d':f.status==='en_proceso'?'#3a2e00':esAct?'#1a1a2e':'#1a1a1a';
                const border=f.status==='completada'?'1px solid #4ade80':f.status==='en_proceso'?'1px solid #f5c518':esAct?'1px solid #6366f1':'1px solid #2a2a2a';
                return (
                  <div key={fase.id} style={{background:bg,border,borderRadius:12,padding:12}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
                      <div style={{display:'flex',alignItems:'center',gap:10}}>
                        <span style={{width:36,height:36,borderRadius:'50%',background:f.status==='completada'?'#4ade80':f.status==='en_proceso'?'#f5c518':'#333',color:f.status==='completada'||f.status==='en_proceso'?'#000':'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:14}}>{f.status==='completada'?'✓':fase.id}</span>
                        <div><div style={{fontWeight:600}}>{fase.nombre}</div><div style={{fontSize:12,color:'#888'}}>{fase.responsable}</div></div>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <Badge status={f.status}/>
                        {f.status==='completada' && fase.id > 1 && (
                          <button onClick={()=>retroceder(pala.id, fase.id)} style={{padding:'4px 10px',borderRadius:8,background:'#333',color:'#f5c518',border:'1px solid #f5c518',fontSize:12,fontWeight:600,cursor:'pointer'}} title="Retroceder a esta fase">↩ Retroceder</button>
                        )}
                      </div>
                    </div>
                    {(f.startedAt||f.finishedAt) && (
                      <div style={{marginTop:6,fontSize:12,color:'#888',display:'flex',gap:16,paddingLeft:46}}>
                        {f.startedAt && <span>Inicio: {fmt(f.startedAt)}</span>}
                        {f.finishedAt && <span>Fin: {fmt(f.finishedAt)}</span>}
                      </div>
                    )}
                    {esAct && f.status==='pendiente'   && <div style={{marginTop:8,paddingLeft:46}}><button onClick={()=>iniciar(pala.id,fase.id)}   style={{padding:'8px 16px',borderRadius:10,background:'#f5c518',color:'#000',fontWeight:700,border:'none'}}>▶ Iniciar fase</button></div>}
                    {esAct && f.status==='en_proceso'  && <div style={{marginTop:8,paddingLeft:46}}><button onClick={()=>completar(pala.id,fase.id)} style={{padding:'8px 16px',borderRadius:10,background:'#4ade80',color:'#000',fontWeight:700,border:'none'}}>✓ Completar fase</button></div>}
                  </div>
                );
              })}
            </div>
            {comp && <div style={{marginTop:12,background:'#0d2e0d',border:'1px solid #4ade80',borderRadius:12,padding:12,textAlign:'center',color:'#4ade80',fontWeight:600}}>✅ Pala completada y enviada</div>}
          </div>
          <div>
            <div style={{fontWeight:700,fontSize:17,marginBottom:12}}>Añadir nota o incidencia</div>
            <div style={{background:'#111',border:'1px solid #333',borderRadius:16,padding:16,display:'flex',flexDirection:'column',gap:12}}>
              <textarea value={texto} onChange={e=>setTexto(e.target.value)} placeholder="Observación, anomalía o instrucción especial…" rows={3} style={{width:'100%',background:'#1a1a1a',border:'1px solid #444',borderRadius:10,padding:12,color:'white',fontSize:15,resize:'none'}}/>
              <div style={{display:'flex',flexWrap:'wrap',gap:8,alignItems:'center'}}>
                <button onClick={()=>setTipo('info')}     style={{padding:'8px 14px',borderRadius:10,border:tipo==='info'?'2px solid #6366f1':'2px solid #333',background:tipo==='info'?'#1e1b4b':'#1a1a1a',color:tipo==='info'?'#818cf8':'#fff',fontWeight:600}}>📝 Informativa</button>
                <button onClick={()=>setTipo('anomalia')} style={{padding:'8px 14px',borderRadius:10,border:tipo==='anomalia'?'2px solid #f87171':'2px solid #333',background:tipo==='anomalia'?'#2e0d0d':'#1a1a1a',color:tipo==='anomalia'?'#f87171':'#fff',fontWeight:600}}>⚠️ Anomalía</button>
                <select value={autor} onChange={e=>setAutor(e.target.value)} style={{padding:'8px 12px',borderRadius:10,border:'2px solid #333',background:'#1a1a1a',color:'white',fontWeight:600}}>
                  {AUTORES.map(a=><option key={a} value={a}>{a}</option>)}
                </select>
                <button onClick={()=>{ if(!texto.trim()) return; addNota(pala.id,{texto:texto.trim(),tipo,autor}); setTexto(''); setTipo('info'); }} disabled={!texto.trim()} style={{padding:'8px 18px',borderRadius:10,background:texto.trim()?'#f5c518':'#333',color:texto.trim()?'#000':'#888',fontWeight:700,border:'none',marginLeft:'auto'}}>Guardar</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
